<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Health Tracker</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS (xlsx) library for Excel export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* Custom CSS for Inter font and general styling */
        body {
            font-family: "Inter", sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Align to top to prevent jumping */
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 900px;
            margin-top: 20px; /* Add some margin from the top */
        }
        .input-group label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: block;
        }
        .input-group input,
        .input-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
            box-sizing: border-box; /* Ensure padding doesn't increase width */
        }
        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: #6366f1; /* Indigo 500 */
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        @media (min-width: 640px) {
            .action-buttons {
                grid-template-columns: 1fr 1fr;
            }
        }
        .add-button, .export-button {
            color: white;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border: none;
            width: 100%;
        }
        .add-button {
            background-color: #6366f1; /* Indigo 500 */
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.3);
        }
        .add-button:hover {
            background-color: #4f46e5; /* Indigo 600 */
            transform: translateY(-2px);
        }
        .add-button:active {
            transform: translateY(0);
            box-shadow: 0 3px 10px rgba(99, 102, 241, 0.4);
        }
        .export-button {
            background-color: #22c55e; /* Green 500 */
            box-shadow: 0 5px 15px rgba(34, 197, 94, 0.3);
        }
        .export-button:hover {
            background-color: #16a34a; /* Green 600 */
            transform: translateY(-2px);
        }
        .export-button:active {
            transform: translateY(0);
            box-shadow: 0 3px 10px rgba(34, 197, 94, 0.4);
        }
        table {
            width: 100%;
            border-collapse: separate; /* Use separate for rounded corners on cells */
            border-spacing: 0;
            margin-top: 30px;
            background-color: #ffffff;
            border-radius: 10px;
            overflow: hidden; /* Ensures rounded corners are applied */
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
        th, td {
            text-align: left;
            padding: 15px 20px;
            border-bottom: 1px solid #f0f0f0;
        }
        th {
            background-color: #f8f9fa;
            color: #555;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 14px;
        }
        tr:last-child td {
            border-bottom: none;
        }
        tr:hover {
            background-color: #f5f7fa;
        }
        .delete-button {
            background-color: #ef4444; /* Red 500 */
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            border: none;
        }
        .delete-button:hover {
            background-color: #dc2626; /* Red 600 */
        }
        .error-message {
            color: #ef4444; /* Red 500 */
            font-size: 13px;
            margin-top: 5px;
            display: none; /* Hidden by default */
        }
        .loading-indicator {
            text-align: center;
            padding: 20px;
            font-size: 18px;
            color: #666;
        }
        /* Responsive adjustments */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            .input-group {
                margin-bottom: 15px;
            }
            .action-buttons {
                grid-template-columns: 1fr;
            }
            .add-button, .export-button {
                padding: 10px 20px;
                font-size: 16px;
            }
            table, thead, tbody, th, td, tr {
                display: block;
            }
            thead tr {
                position: absolute;
                top: -9999px;
                left: -9999px;
            }
            tr {
                border: 1px solid #f0f0f0;
                margin-bottom: 15px;
                border-radius: 10px;
                overflow: hidden;
            }
            td {
                border: none;
                position: relative;
                padding-left: 50%;
                text-align: right;
            }
            td:before {
                position: absolute;
                top: 0;
                left: 6px;
                width: 45%;
                padding-right: 10px;
                white-space: nowrap;
                text-align: left;
                font-weight: 600;
                color: #555;
            }
            td:nth-of-type(1):before { content: "Date"; }
            td:nth-of-type(2):before { content: "Time Period"; }
            td:nth-of-type(3):before { content: "BP Level"; }
            td:nth-of-type(4):before { content: "Sugar Level"; }
            td:nth-of-type(5):before { content: "Actions"; }
            .delete-button {
                width: 100%;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-3xl font-bold text-gray-800 mb-8 text-center">Daily Health Tracker</h1>

        <!-- Input Form -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="input-group">
                <label for="dateInput">Date</label>
                <input type="date" id="dateInput" class="rounded-lg" required>
            </div>
            <div class="input-group">
                <label for="timePeriodSelect">Time Period</label>
                <select id="timePeriodSelect" class="rounded-lg" required>
                    <option value="Morning">Morning</option>
                    <option value="Afternoon">Afternoon</option>
                    <option value="Night">Night</option>
                </select>
            </div>
            <div class="input-group">
                <label for="bpLevelInput">BP Level (mmHg)</label>
                <input type="text" id="bpLevelInput" class="rounded-lg" placeholder="e.g., 120/80" pattern="^\d{2,3}\/\d{2,3}$" required>
                <p id="bpError" class="error-message">Please enter BP in ###/## format (e.g., 120/80).</p>
            </div>
            <div class="input-group">
                <label for="sugarLevelInput">Sugar Level (mg/dL)</label>
                <input type="number" id="sugarLevelInput" class="rounded-lg" placeholder="e.g., 90" min="50" required>
                <p id="sugarError" class="error-message">Please enter a valid sugar level (min 50).</p>
            </div>
        </div>

        <div class="action-buttons">
            <button id="addEntryButton" class="add-button">Add Entry</button>
            <button id="exportExcelButton" class="export-button">Export to Excel</button>
        </div>


        <!-- Loading Indicator -->
        <div id="loadingIndicator" class="loading-indicator hidden">
            Loading data...
        </div>

        <!-- Data Table -->
        <div class="overflow-x-auto">
            <table id="healthDataTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Time Period</th>
                        <th>BP Level</th>
                        <th>Sugar Level</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Data rows will be inserted here by JavaScript -->
                </tbody>
            </table>
        </div>

        <!-- Custom Modal for Confirmation/Alerts -->
        <div id="customModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center hidden">
            <div class="bg-white p-6 rounded-lg shadow-xl max-w-sm w-full text-center">
                <h3 id="modalTitle" class="text-lg font-semibold mb-4"></h3>
                <p id="modalMessage" class="text-gray-700 mb-6"></p>
                <div class="flex justify-center space-x-4">
                    <button id="modalConfirmButton" class="bg-red-500 text-white px-4 py-2 rounded-md hover:bg-red-600 hidden">Confirm</button>
                    <button id="modalCloseButton" class="bg-indigo-500 text-white px-4 py-2 rounded-md hover:bg-indigo-600">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Get DOM elements
        const dateInput = document.getElementById('dateInput');
        const timePeriodSelect = document.getElementById('timePeriodSelect');
        const bpLevelInput = document.getElementById('bpLevelInput');
        const sugarLevelInput = document.getElementById('sugarLevelInput');
        const addEntryButton = document.getElementById('addEntryButton');
        const exportExcelButton = document.getElementById('exportExcelButton');
        const healthDataTableBody = document.querySelector('#healthDataTable tbody');
        const bpError = document.getElementById('bpError');
        const sugarError = document.getElementById('sugarError');
        const loadingIndicator = document.getElementById('loadingIndicator'); // Still exists in HTML, but hidden

        // Modal elements
        const customModal = document.getElementById('customModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalMessage = document.getElementById('modalMessage');
        const modalConfirmButton = document.getElementById('modalConfirmButton');
        const modalCloseButton = document.getElementById('modalCloseButton');

        const LOCAL_STORAGE_KEY = 'healthTrackerData';
        let currentHealthData = []; // Store current data for export

        /**
         * Shows a custom modal dialog.
         * @param {string} title - The title of the modal.
         * @param {string} message - The message to display in the modal.
         * @param {boolean} isConfirm - If true, shows a confirm button.
         * @returns {Promise<boolean>} - Resolves true if confirmed, false if closed.
         */
        function showCustomModal(title, message, isConfirm = false) {
            return new Promise((resolve) => {
                modalTitle.textContent = title;
                modalMessage.textContent = message;
                customModal.classList.remove('hidden');

                if (isConfirm) {
                    modalConfirmButton.classList.remove('hidden');
                    modalConfirmButton.onclick = () => {
                        customModal.classList.add('hidden');
                        resolve(true);
                    };
                } else {
                    modalConfirmButton.classList.add('hidden');
                }

                modalCloseButton.onclick = () => {
                    customModal.classList.add('hidden');
                    resolve(false);
                };
            });
        }

        /**
         * Validates the input fields before adding an entry.
         * @returns {boolean} - True if all inputs are valid, false otherwise.
         */
        function validateInputs() {
            let isValid = true;

            // Date validation (handled by 'required' and type="date")

            // BP Level validation
            const bpPattern = /^\d{2,3}\/\d{2,3}$/;
            if (!bpPattern.test(bpLevelInput.value)) {
                bpError.style.display = 'block';
                isValid = false;
            } else {
                bpError.style.display = 'none';
            }

            // Sugar Level validation
            const sugarValue = parseInt(sugarLevelInput.value, 10);
            if (isNaN(sugarValue) || sugarValue < 50) {
                sugarError.style.display = 'block';
                isValid = false;
            } else {
                sugarError.style.display = 'none';
            }

            return isValid;
        }

        /**
         * Loads health data from localStorage.
         * @returns {Array<Object>} - An array of health entry objects.
         */
        function loadHealthData() {
            try {
                const data = localStorage.getItem(LOCAL_STORAGE_KEY);
                return data ? JSON.parse(data) : [];
            } catch (e) {
                console.error("Error loading data from localStorage:", e);
                showCustomModal("Error", "Failed to load saved data from your browser. " + e.message);
                return [];
            }
        }

        /**
         * Saves health data to localStorage.
         * @param {Array<Object>} data - The array of health entry objects to save.
         */
        function saveHealthData(data) {
            try {
                localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(data));
            } catch (e) {
                console.error("Error saving data to localStorage:", e);
                showCustomModal("Error", "Failed to save data to your browser. " + e.message);
            }
        }

        /**
         * Adds a new health entry.
         */
        function addHealthEntry() {
            if (!validateInputs()) {
                showCustomModal("Validation Error", "Please correct the errors in the form.");
                return;
            }

            const newEntry = {
                id: Date.now().toString(), // Simple unique ID for local storage
                date: dateInput.value,
                timePeriod: timePeriodSelect.value,
                bpLevel: bpLevelInput.value,
                sugarLevel: parseInt(sugarLevelInput.value, 10),
                timestamp: Date.now() // Add a timestamp for ordering
            };

            const updatedData = loadHealthData();
            updatedData.push(newEntry);
            saveHealthData(updatedData);
            renderHealthData(updatedData);

            // Clear form fields after successful submission
            dateInput.value = '';
            timePeriodSelect.value = 'Morning';
            bpLevelInput.value = '';
            sugarLevelInput.value = '';
        }

        /**
         * Deletes a health entry.
         * @param {string} idToDelete - The ID of the entry to delete.
         */
        async function deleteHealthEntry(idToDelete) {
            const confirmDelete = await showCustomModal(
                "Confirm Delete",
                "Are you sure you want to delete this entry?",
                true // isConfirm = true
            );

            if (!confirmDelete) {
                return; // User cancelled
            }

            let updatedData = loadHealthData();
            updatedData = updatedData.filter(entry => entry.id !== idToDelete);
            saveHealthData(updatedData);
            renderHealthData(updatedData);
        }

        /**
         * Renders the health data in the table.
         * @param {Array<Object>} data - An array of health entry objects.
         */
        function renderHealthData(data) {
            healthDataTableBody.innerHTML = ''; // Clear existing rows
            currentHealthData = data; // Update the global data array for export

            if (data.length === 0) {
                healthDataTableBody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-gray-500">No entries yet. Add your first entry above!</td></tr>';
                return;
            }

            // Sort data by timestamp in descending order (most recent first)
            data.sort((a, b) => b.timestamp - a.timestamp);

            data.forEach(entry => {
                const row = healthDataTableBody.insertRow();
                row.innerHTML = `
                    <td>${entry.date}</td>
                    <td>${entry.timePeriod}</td>
                    <td>${entry.bpLevel}</td>
                    <td>${entry.sugarLevel}</td>
                    <td>
                        <button class="delete-button" data-id="${entry.id}">Delete</button>
                    </td>
                `;
            });

            // Attach event listeners to new delete buttons
            document.querySelectorAll('.delete-button').forEach(button => {
                button.onclick = (event) => {
                    const docId = event.target.dataset.id;
                    deleteHealthEntry(docId);
                };
            });
        }

        /**
         * Exports the current health data to an Excel (.xlsx) file.
         */
        function exportToExcel() {
            if (currentHealthData.length === 0) {
                showCustomModal("No Data", "There is no data to export yet.");
                return;
            }

            const headers = ["Date", "Time Period", "BP Level (mmHg)", "Sugar Level (mg/dL)"];
            const rows = currentHealthData.map(entry => [
                entry.date,
                entry.timePeriod,
                entry.bpLevel,
                entry.sugarLevel
            ]);

            // Combine headers and rows
            const dataForSheet = [headers, ...rows];

            // Create a new workbook and a worksheet
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(dataForSheet);

            // Add the worksheet to the workbook
            XLSX.utils.book_append_sheet(wb, ws, "Health Data");

            // Write the workbook to a file
            XLSX.writeFile(wb, "daily_health_tracker.xlsx");
        }

        // Event Listeners
        window.onload = () => {
            // Set today's date as default
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0'); // Months are 0-indexed
            const dd = String(today.getDate()).padStart(2, '0');
            dateInput.value = `${yyyy}-${mm}-${dd}`;

            // Load and render existing data from localStorage
            renderHealthData(loadHealthData());
        };

        addEntryButton.addEventListener('click', addHealthEntry);
        exportExcelButton.addEventListener('click', exportToExcel);

        // Hide error messages on input change
        bpLevelInput.addEventListener('input', () => bpError.style.display = 'none');
        sugarLevelInput.addEventListener('input', () => sugarError.style.display = 'none');
    </script>
</body>
</html>
